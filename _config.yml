remote_theme: jekyll/minima
# Dependencies
markdown:         kramdown
highlighter:      rouge

plugins:
- jekyll-remote-theme
- jekyll-redirect-from
- jekyll-sitemap
- jekyll-feed
- jekyll-seo-tag

# Permalinks
permalink:        pretty

# Setup
title:            Alex Yorke
tagline:          'Personal website and engineering writing'
description:      "Personal website of Alex Yorke, also known as Alex York. Writing on CI/CD, testing, reliability, shell tooling, and functional programming."
url:              https://alexyorke.github.io
baseurl:          ""
lang:             en
image:            /assets/images/social-card.png
alternate_name:   Alex York
same_as:
  - https://github.com/alexyorke
  - https://www.linkedin.com/in/alexyorke
  - https://stackoverflow.com/users/220935/alexyorke
knows_about:
  - CI/CD
  - software testing
  - production reliability
  - shell tooling
  - functional programming
header_pages:
  - about.md
  - blog.html
author_url:       https://alexyorke.github.io
author:
  name:           'Alex Yorke'
  url:            https://alexyorke.github.io

profiles:
  github:         https://github.com/alexyorke
  linkedin:       https://www.linkedin.com/in/alexyorke
  stackoverflow:  https://stackoverflow.com/users/220935/alexyorke

google_analytics: G-2GV04PM05P

# Make sure page/post excerpts are well-formed and consistent for feeds/search.
excerpt_separator: "\n\n"

# Default metadata (used by jekyll-seo-tag when a page/post doesn't specify its own).
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Alex Yorke"
