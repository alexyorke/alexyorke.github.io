remote_theme: jekyll/minima
# Dependencies
markdown:         kramdown
highlighter:      rouge

plugins:
- jekyll-remote-theme
- jekyll-redirect-from
- jekyll-sitemap
- jekyll-feed
- jekyll-seo-tag

# Permalinks
permalink:        pretty

# Setup
title:            Alex Yorke
tagline:          'Engineering writing and practical technical notes'
description:      "Practical writing on CI/CD, testing, reliability, shell tooling, and functional programming."
url:              https://alexyorke.github.io
baseurl:          ""
lang:             en
image:            /assets/images/social-card.png
author_url:       https://alexyorke.github.io
header_pages:
  - blog.html

author:
  name:           'Alex Yorke'
  url:            https://alexyorke.github.io

google_analytics: G-2GV04PM05P

# Make sure page/post excerpts are well-formed and consistent for feeds/search.
excerpt_separator: "\n\n"

# Default metadata (used by jekyll-seo-tag when a page/post doesn't specify its own).
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Alex Yorke"
